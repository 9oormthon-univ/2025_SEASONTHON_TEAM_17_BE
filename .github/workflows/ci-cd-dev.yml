name: 'CI/CD develop'

on:
  push:
    branches:
      - 'develop'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: make application-dev.yml & select profile
        run: |
          cd ./src/main/resources/
          export SPRING_PROFILE=dev
          echo "${{ secrets.APPLICATION_DEV }}" > ./application-dev.yml
        shell: bash

      - name: make firebase dir
        run: mkdir -p src/main/resources/firebase
      
      - name: Make fcm.json
        uses: jsdaniell/create-json@v1.2.2
        with:
          json: ${{ secrets.FIREBASE_JSON }}
          dir: src/main/resources/firebase
          name: ${{ secrets.FCM_FILE_NAME }}   
          
      - name: make .env
        run: |
          echo "${{ secrets.ENV }}" > .env

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew build -x test

      - name: Docker build & Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_ID }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_ID }}/maeum:dev .
          docker push ${{ secrets.DOCKER_ID }}/maeum:dev

      - name: Deploy images with Docker compose
        uses: appleboy/ssh-action@v1.0.0
        env:
          APP: "maeum-dev"
          COMPOSE: "/home/ubuntu/compose/docker-compose-dev.yml"
        with:
          host: ${{secrets.AWS_EC2_DEV_HOST}}
          username: ubuntu
          key: ${{secrets.AWS_EC2_DEV_PRIVATE_KEY}}
          port: 22
          envs: APP, COMPOSE
          script_stop: true
          script: |
            docker-compose -f $COMPOSE down
            docker pull ${{ secrets.DOCKER_ID }}/maeum:dev
            docker-compose -f $COMPOSE up -d
